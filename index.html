    <script>
        // --- 核心全局状态 ---
        let currentStamina = 200;
        const maxStamina = 200;
        const recoveryIntervalMinutes = 8; // 每8分钟回复1点
        
        // 用于精确倒计时模拟的状态
        let secondsRemainingForNextPoint = recoveryIntervalMinutes * 60; 
        let isSpeedMode = false;

        // --- 初始化设置 ---
        window.onload = function() {
            // 定时更新虚拟手机状态栏的时间
            setInterval(updateSystemTime, 1000);
            updateSystemTime();

            // 核心高频定时器（负责计算体力恢复和倒计时刷新）
            setInterval(gameTick, 1000);

            // 初始化界面刷新
            renderUI();
            
            // 监听测试控制台的“加速流逝”开关
            document.getElementById('speedMode').addEventListener('change', function(e) {
                isSpeedMode = e.target.checked;
                showToast(isSpeedMode ? "⚡ 开启时间加速！1秒代表1分钟" : "🐢 恢复正常时间速率");
            });
        };

        // --- 虚拟手机时间生成器 ---
        function updateSystemTime() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('statusBarTime').innerText = timeStr;
            document.getElementById('launcherStatusTime').innerText = timeStr;
        }

        // --- 核心引擎：时间推进与体力恢复逻辑 ---
        function gameTick() {
            if (currentStamina >= maxStamina) {
                currentStamina = maxStamina;
                secondsRemainingForNextPoint = recoveryIntervalMinutes * 60;
                renderUI();
                return;
            }

            // 时间流逝速率判定
            if (isSpeedMode) {
                // 加速模式下：1秒时间流逝 = 1分钟（即60秒）
                secondsRemainingForNextPoint -= 60;
            } else {
                // 正常模式下：每秒减少1秒
                secondsRemainingForNextPoint -= 1;
            }

            // 检查是否已经跨越了“8分钟周期”，应该结算加点了
            if (secondsRemainingForNextPoint <= 0) {
                // 恢复一点体力
                currentStamina++;
                // 重置下一点的倒计时（补偿计算可能存在的溢出差值）
                secondsRemainingForNextPoint = (recoveryIntervalMinutes * 60) + secondsRemainingForNextPoint;
                
                if (currentStamina > maxStamina) currentStamina = maxStamina;
                showToast("✨ 每隔8分钟：体力自然回复了 1 点！");
            }

            renderUI();
        }

        // --- 主UI渲染机（全面同步主页面与桌面小组件） ---
        function renderUI() {
            // 1. 同步数字
            document.getElementById('appStaminaText').innerText = currentStamina;
            document.getElementById('widgetStaminaText').innerText = currentStamina;

            // 2. 计算并同步主界面圆形进度条的 Dashoffset
            // 圆周长约为 276.46
            const maxOffset = 276.46;
            const progressRatio = currentStamina / maxStamina;
            const currentOffset = maxOffset - (maxOffset * progressRatio);
            document.getElementById('staminaProgressCircle').style.strokeDashoffset = currentOffset;

            // 3. 同步小组件条形进度条宽度
            document.getElementById('widgetProgressBar').style.width = (progressRatio * 100) + '%';

            // 4. 处理倒计时与文字提示
            const statusText = document.getElementById('recoveryStatusText');
            const countdownBox = document.getElementById('countdownBox');
            const widgetCountdown = document.getElementById('widgetCountdown');

            if (currentStamina >= maxStamina) {
                statusText.innerText = "体力已满，处于巅峰状态";
                statusText.className = "text-sm font-medium text-emerald-400";
                countdownBox.classList.add('hidden');
                widgetCountdown.innerText = "Stamina is full";
                widgetCountdown.className = "text-[10px] text-emerald-400 font-medium";
            } else {
                statusText.innerText = "体力正在恢复中...";
                statusText.className = "text-sm font-medium text-amber-400 animate-pulse";
                countdownBox.classList.remove('hidden');

                // 格式化当前点回复倒计时
                const m = Math.floor(secondsRemainingForNextPoint / 60);
                const s = secondsRemainingForNextPoint % 60;
                const nextPointStr = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                document.getElementById('nextPointTime').innerText = nextPointStr;
                widgetCountdown.innerText = `+1点 / 还有 ${nextPointStr}`;
                widgetCountdown.className = "text-[10px] text-zinc-300 font-mono";

                // 计算并格式化充满所需要的时间
                const missingPoints = maxStamina - currentStamina;
                const totalSecondsNeeded = ((missingPoints - 1) * recoveryIntervalMinutes * 60) + secondsRemainingForNextPoint;
                const totalMinutesNeeded = Math.ceil(totalSecondsNeeded / 60);
                const hours = Math.floor(totalMinutesNeeded / 60);
                const mins = totalMinutesNeeded % 60;
                document.getElementById('fullTime').innerText = `${hours.toString().padStart(2, '0')}小时${mins.toString().padStart(2, '0')}分钟`;
            }
        }

        // --- 核心业务：手动消费扣除体力 ---
        function consumeStamina(points, actionName = "手动消耗") {
            if (currentStamina <= 0) {
                showToast("❌ 体力已经透支！请先休息恢复体力。");
                return;
            }

            // 执行扣除
            let actualDeducted = points;
            if (currentStamina - points < 0) {
                actualDeducted = currentStamina; // 最多扣到0
            }
            currentStamina -= actualDeducted;

            showToast(`⚡ 记录成功: [${actionName}] 消耗 ${actualDeducted} 点体力`);
            
            // 只要不是满状态，触发倒计时重置为满周期（符合游戏常理：开始亏损后重新计时）
            if (currentStamina < maxStamina && secondsRemainingForNextPoint <= 0) {
                secondsRemainingForNextPoint = recoveryIntervalMinutes * 60;
            }

            renderUI();
        }

        // 处理自定义表单扣除
        function handleCustomConsume() {
            const input = document.getElementById('customConsumeInput');
            const val = parseInt(input.value);
            if (isNaN(val) || val <= 0) {
                showToast("⚠️ 请先输入有效的体力扣减点数");
                return;
            }
            consumeStamina(val, "自定义事务");
            input.value = ''; // 清空输入框
        }

        // --- 测试台专属：直接强制覆写体力数值 ---
        function resetStamina(targetValue) {
            currentStamina = targetValue;
            secondsRemainingForNextPoint = recoveryIntervalMinutes * 60;
            showToast(`⚙️ 调试控制台：体力已被强制变更为 ${targetValue}`);
            renderUI();
        }

        // --- 视图无缝切换逻辑 (App内部) ---
        function switchView(viewName) {
            if (viewName === 'theme') {
                document.getElementById('viewMain').classList.add('hidden');
                document.getElementById('viewTheme').classList.remove('hidden');
            } else {
                document.getElementById('viewTheme').classList.add('hidden');
                document.getElementById('viewMain').classList.remove('hidden');
            }
        }

        // --- 换肤系统 1：主应用背景预设切换 ---
        function setAppBg(preset) {
            const app = document.getElementById('appDevice');
            const urls = {
                preset1: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop',
                preset2: 'https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?q=80&w=600&auto=format&fit=crop',
                preset3: 'https://images.unsplash.com/photo-1604871000636-074fa5117945?q=80&w=600&auto=format&fit=crop'
            };
            app.style.backgroundImage = `url('${urls[preset]}')`;
            
            // 清理边框选中特效
            ['appPreset1', 'appPreset2', 'appPreset3'].forEach(id => {
                document.getElementById(id).className = "h-16 rounded-lg bg-cover bg-center cursor-pointer border border-transparent hover:border-zinc-500 transition";
            });
            // 高亮当前选中
            document.getElementById('app' + preset.charAt(0).toUpperCase() + preset.slice(1)).className = "h-16 rounded-lg bg-cover bg-center cursor-pointer border-2 border-emerald-500 transition";
            showToast("🎨 主应用背景壁纸更换成功！");
        }

        // --- 换肤系统 2：小组件背景预设切换 ---
        function setWidgetBg(preset) {
            const widget = document.getElementById('widgetCard');
            const urls = {
                preset1: 'https://images.unsplash.com/photo-1579546929518-9e396f3cc809?q=80&w=400&auto=format&fit=crop',
                preset2: 'https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?q=80&w=400&auto=format&fit=crop',
                preset3: 'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=400&auto=format&fit=crop'
            };
            widget.style.backgroundImage = `url('${urls[preset]}')`;

            // 清理边框选中特效
            ['widgetPreset1', 'widgetPreset2', 'widgetPreset3'].forEach(id => {
                document.getElementById(id).className = "h-16 rounded-lg bg-cover bg-center cursor-pointer border border-transparent hover:border-zinc-500 transition";
            });
            // 高亮当前选中
            document.getElementById('widget' + preset.charAt(0).toUpperCase() + preset.slice(1)).className = "h-16 rounded-lg bg-cover bg-center cursor-pointer border-2 border-emerald-500 transition";
            showToast("🎨 桌面小组件背景更换成功！");
        }

        // --- 换肤系统 3：支持用户本地相册上传读取图片 ---
        function uploadBg(event, target) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const imgUrl = e.target.result;
                if (target === 'app') {
                    document.getElementById('appDevice').style.backgroundImage = `url('${imgUrl}')`;
                    showToast("🖼️ 成功导入一张用户本地图片作为 App 背景");
                } else {
                    document.getElementById('widgetCard').style.backgroundImage = `url('${imgUrl}')`;
                    showToast("🖼️ 成功导入一张用户本地图片作为 小组件 背景");
                }
            };
            reader.readAsDataURL(file);
        }

        // --- 纯轻量级轻提示组件 (Toast) ---
        function showToast(message) {
            const toast = document.getElementById('toastNotification');
            document.getElementById('toastText').innerText = message;
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-1/2, 0) translateY(-10px)';
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-1/2, 0) translateY(0px)';
            }, 3000);
        }
    </script>
</body>
</html>
